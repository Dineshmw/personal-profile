name: Deploy Laravel to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2' # Change this if your cPanel uses a different PHP version
          
      - name: Install Composer Dependencies
        working-directory: ./portfolio_app
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup environment file
        working-directory: ./portfolio_app
        run: cp .env.example .env

      - name: Generate Application Key
        working-directory: ./portfolio_app
        run: php artisan key:generate

      - name: Deploy via FTP to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # The local directory containing your Laravel app
          local-dir: ./portfolio_app/
          # The directory on cPanel where the app should be uploaded. 
          # Modify this if your app is hosted in a subfolder or public_html
          server-dir: /public_html/dineshweerasekara.com/
          # Exclude files you don't want to override on the server
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .env
            storage/app/public/**
